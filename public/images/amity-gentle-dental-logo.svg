<svg xmlns="http://www.w3.org/2000/svg" width="360" height="72" viewBox="0 0 360 72" fill="none" aria-labelledby="agdLogoTitle" role="img">
  <title id="agdLogoTitle">Amity Gentle Dental — A Christian dental practice</title>
  <defs>
    <!-- Brand ring: royal blue → lime → blue -->
    <linearGradient id="agdLgRing" x1="4" y1="36" x2="48" y2="36" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1d4ed8"/>
      <stop offset="0.45" stop-color="#84cc16"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="agdLgTooth" x1="10" y1="14" x2="40" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3b82f6"/>
      <stop offset="0.45" stop-color="#65a30d"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="agdLgShine" x1="14" y1="12" x2="30" y2="28" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Subtle connector line -->
    <linearGradient id="agdLgLine" x1="54" y1="36" x2="76" y2="36" gradientUnits="userSpaceOnUse">
      <stop stop-color="#93c5fd" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#93c5fd" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#84cc16" stop-opacity="0.35"/>
    </linearGradient>
  </defs>

  <!-- Icon medallion: transparent center, only stroke + mark -->
  <g>
    <circle cx="26" cy="36" r="23.5" fill="none" stroke="url(#agdLgRing)" stroke-width="2" opacity="0.95"/>
    <g transform="translate(26, 36) translate(-21, -24) scale(1.02)">
      <path
        fill="url(#agdLgTooth)"
        d="M24 4C18 4 10 10 8 18c-2 12-4 28 6 32 4 2 8-2 10-10 2 8 6 12 10 10 10-4 8-20 6-32-2-8-10-14-16-14-2 0-4 0-6 2-2-2-4-2-6-2Z"
      />
      <path
        fill="url(#agdLgShine)"
        d="M26 8c-3.5 0-7 2.5-9 6.5-1 3-1.5 6.5-1 10 .2 1.2.5 2.4 1 3.5 2-4 6.5-6.5 11-6.5 3 0 5.5 1.2 7 3.2C35.5 16 31 8 26 8Z"
      />
    </g>
  </g>

  <line x1="52" y1="36" x2="70" y2="36" stroke="url(#agdLgLine)" stroke-width="1.75" stroke-linecap="round"/>

  <!-- Wordmark: matches site serif/sans pairing; no background -->
  <text
    xml:space="preserve"
    text-rendering="geometricPrecision"
    font-family="Fraunces, Georgia, 'Times New Roman', ui-serif, serif"
    font-size="23"
    font-weight="700"
    letter-spacing="-0.025em"
  >
    <tspan fill="#1e40af" x="76" y="40">Amity </tspan>
    <tspan fill="#4d7c0f">Gentle </tspan>
    <tspan fill="#1d4ed8">Dental</tspan>
  </text>
  <text
    text-rendering="geometricPrecision"
    font-family="'Plus Jakarta Sans', system-ui, 'Segoe UI', sans-serif"
    font-size="10.5"
    font-weight="600"
    letter-spacing="0.18em"
    fill="#475569"
    x="76"
    y="56"
  >
    A CHRISTIAN DENTAL PRACTICE
  </text>
</svg>
